name: Global SEO Text Optimizer (US & EU)

on:
  workflow_dispatch: # מאפשר הרצה ידנית בלחיצת כפתור

jobs:
  optimize_text:
    runs-on: ubuntu-latest
    permissions:
      contents: write # חובה כדי שהבוט יוכל לשמור קבצים

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 google-genai pytrends requests

      - name: Run Global SEO Optimizer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python optimizer.py

      - name: Commit Optimized Content
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "SEO Optimizer Bot"
          git add OPTIMIZED_ARTICLE.html SEO_CHANGELOG.md seo_data.json
          git commit -m "🌍 Generated Optimized HTML and SEO Changelog" || echo "No changes to commit"
          git push
