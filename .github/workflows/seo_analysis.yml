name: SEO AI Analysis

on:
  workflow_dispatch: # הפעלה ידנית

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install beautifulsoup4 google-generativeai pytrends lxml

      - name: Run Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python analyzer.py

      - name: Commit Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/ai_trends_analysis.json
          git commit -m "Update SEO Analysis" || echo "No changes"
          git push
