name: SEO Analysis and Static API Generation

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # הרצה אוטומטית פעם ביום בחצות
  workflow_dispatch: # מאפשר הרצה ידנית מהממשק

# הגדרת הרשאות חובה על מנת שהתהליך יוכל לכתוב את קובץ ה-JSON בחזרה ל-Repository
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run SEO Analysis
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scripts/analyze_seo.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add public/ai_trends_analysis.json
        git commit -m "Update SEO analysis API data [skip ci]" || echo "No changes to commit"
        git push
